# Auth
register:
  handler: auth/register.lambda_handler
  package: { include: ['./**'] }
  events:
    - http: { path: /auth/register, method: post, cors: true }

login:
  handler: auth/login.lambda_handler
  package: { include: ['./**'] }
  events:
    - http: { path: /auth/login, method: post, cors: true }

authorizer:
  handler: auth/authorizer.lambda_handler
  package: { include: ['./**'] }
  # Lambda Authorizer: los endpoints protegidos lo referencian con  authorizer: authorizer

# Catalogo
listarProductos:
  handler: catalogo/listar_productos.lambda_handler
  package: { include: ['./**'] }
  events:
    - http: { path: /products, method: get, cors: true }

# Pedidos
crearPedido:
  handler: pedidos/crear_pedido.lambda_handler
  package: { include: ['./**'] }
  events:
    - http: { path: /orders, method: post, cors: true }

listarPedidos:
  handler: pedidos/listar_pedidos.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /orders
        method: get
        cors: true
        authorizer: authorizer

obtenerPedido:
  handler: pedidos/obtener_pedido.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /orders/{id}
        method: get
        cors: true
        authorizer: authorizer

avanzarPaso:
  handler: pedidos/avanzar_paso.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /orders/{id}/advance
        method: post
        cors: true
        authorizer: authorizer

# Admisión: el cocinero toma el pedido o lo deriva a revisión
tomarOrden:
  handler: pedidos/tomar_orden.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /orders/{id}/tomar-orden
        method: post
        cors: true
        authorizer: authorizer

# Revisión: el despachador cancela o re-envía a cocina
revisarPedido:
  handler: pedidos/revisar.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /orders/{id}/revisar
        method: post
        cors: true
        authorizer: authorizer

# Workflow
taskHandler:
  handler: workflow/task_handler.lambda_handler   # invocada por la state machine (sin http)
  package: { include: ['./**'] }

notificarRappi:
  handler: workflow/notificar_rappi.lambda_handler
  package: { include: ['./**'] }
  # Event source definido manualmente en serverless.yml (Resources)
  # para no forzar a Serverless a auto-crear el EventBus.

# Webhooks
recibirEntregaRappi:
  handler: webhooks/recibir_entrega.lambda_handler
  package: { include: ['./**'] }
  events:
    - http: { path: /webhooks/rappi/delivered, method: post, cors: true }

# Admin
crearStaff:
  handler: admin/staff.crear_staff
  package: { include: ['./**'] }
  events:
    - http: { path: /admin/staff, method: post, cors: true, authorizer: authorizer }

listarStaff:
  handler: admin/staff.listar_staff
  package: { include: ['./**'] }
  events:
    - http: { path: /admin/staff, method: get, cors: true, authorizer: authorizer }

# Dashboard
dashboard:
  handler: dashboard/dashboard.lambda_handler
  package: { include: ['./**'] }
  events:
    - http:
        path: /dashboard
        method: get
        cors: true
        authorizer: authorizer
